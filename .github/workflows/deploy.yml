name: Deploy ICIF Calculator
on:
  push:
    branches: [ main ]

# Grant permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Compile Engine
        run: |
          emcc engine.c -O3 \
          -s WASM=1 \
          -s ALLOW_MEMORY_GROWTH=1 \
          -s EXPORTED_RUNTIME_METHODS='["ccall", "cwrap"]' \
          -s EXPORTED_FUNCTIONS='["_calculate_icif_table", "_malloc", "_free"]' \
          -s MODULARIZE=0 \
          -o engine.js

      # DEBUG STEP: This lets you see in the Action logs if the files exist
      - name: List files for verification
        run: ls -lh

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This uploads the entire root directory, including untracked engine.js/wasm
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4